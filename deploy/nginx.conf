# Nginx 反向代理設定（參考用）
# 在 aaPanel 環境下，此設定透過圖形介面的「網站設定」管理。
# 此檔案用於參考或非 aaPanel 部署場景。

# 頻率限制區域 — 放在 http{} 區塊中
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

upstream suricata_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # 建議啟用 SSL 後，將 80 port 重導至 443
    # return 301 https://$host$request_uri;

    # React SPA 靜態檔案
    root /www/wwwroot/web-suricata-test/frontend/dist;
    index index.html;

    # 登入端點 — 限速 5r/m
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://suricata_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 端點 — 限速 60r/m
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://suricata_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — 關閉 access_log 避免 JWT token 洩漏
    location /ws/ {
        access_log off;
        proxy_pass http://suricata_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health check — 不計入限速
    location = /health {
        proxy_pass http://suricata_api;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
    }
}
